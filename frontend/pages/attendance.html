<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Посещаемость</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .chart-container { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; max-width: 400px; margin-left: auto; margin-right: auto; }
        .chart-container h3 { text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>📚 Успеваемость</h2>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName"></div>
                <div class="user-role" id="sidebarUserRole"></div>
            </div>
            <ul class="nav-menu" id="navMenu"></ul>
            <button class="logout-btn" onclick="Auth.logout()">🚪 Выйти</button>
        </aside>
        <main class="main-content">
            <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
                <h1>Посещаемость</h1>
                <button id="exportAttendanceBtn" class="btn btn-primary" style="width:auto;padding:10px 20px;">📥 Скачать Excel</button>
            </div>
            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="errorMessage"></div>
            <div id="teacherAttendanceForm" style="display:none;background:var(--card-bg);padding:25px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:25px;">
                <h3 style="margin-bottom:20px;color:var(--primary);">➕ Отметить посещаемость</h3>
                <form id="attendanceForm" style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <select id="attStudentId" required style="padding:12px;border:2px solid var(--border);border-radius:8px;"><option value="">Выберите студента</option></select>
                    <select id="attSubjectId" required style="padding:12px;border:2px solid var(--border);border-radius:8px;"><option value="">Выберите предмет</option></select>
                    <select id="attStatus" required style="padding:12px;border:2px solid var(--border);border-radius:8px;"><option value="">Статус</option><option value="present">Присутствовал</option><option value="absent">Отсутствовал</option><option value="late">Опоздал</option><option value="excused">Уважительная</option></select>
                    <input type="date" id="attDate" style="padding:12px;border:2px solid var(--border);border-radius:8px;">
                    <button type="submit" class="btn btn-primary" style="grid-column:span 2;">✅ Отметить</button>
                </form>
            </div>
            <div class="chart-container"><h3>📊 Статистика посещаемости</h3><canvas id="attendanceChart"></canvas></div>
            <div class="stats-grid" id="attendanceStats"></div>
            <div class="table-container">
                <table>
                    <thead><tr><th>ID</th><th>Студент</th><th>Предмет</th><th>Дата</th><th>Статус</th></tr></thead>
                    <tbody id="attendanceTableBody"><tr><td colspan="5" style="text-align:center;">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        Auth.checkAuth();
        const user = Auth.getUser();
        const token = localStorage.getItem('access_token');
        if (user.role === 'admin') { window.location.href = 'admin.html'; }

        document.getElementById('sidebarUserName').textContent = user.full_name;
        document.getElementById('sidebarUserRole').textContent = user.role==='teacher'?'Преподаватель':'Студент';

        let menu = '<li><a href="dashboard.html"><span class="icon">📊</span> Главная</a></li>';
        menu += '<li><a href="grades.html"><span class="icon">📝</span> Оценки</a></li>';
        menu += '<li><a href="attendance.html" class="active"><span class="icon">📋</span> Посещаемость</a></li>';
        if (user.role === 'teacher') menu += '<li><a href="reports.html"><span class="icon">📈</span> Ведомость</a></li>';
        document.getElementById('navMenu').innerHTML = menu;

        if (user.role === 'teacher') {
            document.getElementById('teacherAttendanceForm').style.display = 'block';
            loadStudentsForSelect();
            loadSubjectsForSelect();
        }

        document.getElementById('exportAttendanceBtn').addEventListener('click', async () => {
            const r = await fetch(`${CONFIG.API_URL}/api/export/attendance?token=${encodeURIComponent(token)}`);
            const b = await r.blob(); const u = URL.createObjectURL(b); const a = document.createElement('a');
            a.href = u; a.download = 'attendance.xlsx'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
        });

        async function loadStudentsForSelect() {
            const s = await API.get('/api/admin/students');
            document.getElementById('attStudentId').innerHTML = '<option value="">Выберите студента</option>' + s.map(x => `<option value="${x.id}">${x.full_name} (гр. ${x.group_name})</option>`).join('');
        }
        async function loadSubjectsForSelect() {
            const s = user.role==='teacher' ? await API.get('/api/grades/teacher/subjects') : await API.get('/api/admin/subjects');
            document.getElementById('attSubjectId').innerHTML = '<option value="">Выберите предмет</option>' + s.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
        }

        let attendanceChart = null;
        function drawChart(p, a, l, e) {
            const canvas = document.getElementById('attendanceChart'); if(!canvas) return;
            const ctx = canvas.getContext('2d'); if(attendanceChart) attendanceChart.destroy();
            if(p+a+l+e===0) return;
            attendanceChart = new Chart(ctx, { type:'doughnut', data:{ labels:['Присутствовал','Отсутствовал','Опоздал','Уваж.'], datasets:[{ data:[p,a,l,e], backgroundColor:['#2ecc71','#e74c3c','#f39c12','#3498db'], borderWidth:3 }] }, options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{ padding:15, font:{ size:12 }, usePointStyle:true } } }, cutout:'65%' } });
        }

        async function loadAttendance() {
            try {
                const url = user.role==='teacher' ? `${CONFIG.API_URL}/api/attendance/teacher/my` : `${CONFIG.API_URL}/api/attendance/student/${user.id}`;
                const r = await fetch(url, { headers:{'Authorization':`Bearer ${token}`} }); const records = await r.json();
                const tbody = document.getElementById('attendanceTableBody');
                if(!records||records.length===0) { tbody.innerHTML='<tr><td colspan="5" style="text-align:center;">Записей пока нет</td></tr>'; drawChart(0,0,0,0); return; }
                const st = { present:'Присутствовал', absent:'Отсутствовал', late:'Опоздал', excused:'Уважительная' };
                tbody.innerHTML = records.map(r => `<tr><td>${r.id}</td><td>${r.student_name||'ID:'+r.student_id}</td><td>${r.subject_name||'ID:'+r.subject_id}</td><td>${r.date?new Date(r.date).toLocaleDateString('ru-RU'):'-'}</td><td><span class="badge badge-${r.status}">${st[r.status]||r.status}</span></td></tr>`).join('');
                const present = records.filter(r=>r.status==='present').length;
                const absent = records.filter(r=>r.status==='absent').length;
                const late = records.filter(r=>r.status==='late').length;
                const excused = records.filter(r=>r.status==='excused').length;
                document.getElementById('attendanceStats').innerHTML = `<div class="stat-card"><div class="stat-value">${records.length}</div><div class="stat-label">Всего</div></div><div class="stat-card"><div class="stat-value" style="color:#2ecc71;">${present}</div><div class="stat-label">Посещено</div></div><div class="stat-card"><div class="stat-value" style="color:#e74c3c;">${absent}</div><div class="stat-label">Пропущено</div></div><div class="stat-card"><div class="stat-value" style="color:#f39c12;">${late}</div><div class="stat-label">Опозданий</div></div>`;
                drawChart(present, absent, late, excused);
            } catch(e) { console.error(e); }
        }

        document.getElementById('attendanceForm')?.addEventListener('submit', async e => {
            e.preventDefault();
            await API.post('/api/attendance/', { student_id: parseInt(document.getElementById('attStudentId').value), subject_id: parseInt(document.getElementById('attSubjectId').value), status: document.getElementById('attStatus').value, lesson_date: document.getElementById('attDate').value || null });
            document.getElementById('successMessage').textContent='✅ Отмечено!'; document.getElementById('successMessage').style.display='block';
            document.getElementById('attendanceForm').reset(); loadAttendance();
            setTimeout(()=>document.getElementById('successMessage').style.display='none', 3000);
        });

        loadAttendance();
    </script>
<script src="../js/theme.js"></script>
</body>
</html>
