<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>📚 Успеваемость</h1>
            <p class="subtitle">Электронная система учёта</p>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    // Если уже залогинен — сразу на дашборд
    if (Auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
    }

    // Запрещаем спецсимволы в логине
    document.getElementById('username').addEventListener('input', function() {
        this.value = Validator.usernamePattern(this.value);
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        errorDiv.style.display = 'none';

        try {
            await Auth.login(username, password);
            window.location.href = 'dashboard.html';
        } catch (error) {
            errorDiv.textContent = error.message || 'Неверный логин или пароль';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
